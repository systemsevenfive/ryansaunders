<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Kitchen Time</title>
    <link rel="stylesheet" href="../../styles.css">
</head>
<body>
    <div class="container">
        <div class="contact-container">
            <div class="button-container">
                <a href="../../index.html" class="back-link">← Back to Home</a>
                <a href="../privacy/index.html" class="back-link">Privacy Policy</a>
            </div>
            
            <div class="contact-content">
                <h1>Kitchen Time Contact</h1>
                
                <p>
                    Have a question or feedback about Kitchen Time? Please fill out the form below and I'll get back to you as soon as possible.
                </p>
                
                <form
                    action="https://formspree.io/f/mvgyazvd"
                    method="POST"
                    class="contact-form"
                >
                    <div class="form-group">
                        <label for="email">Your email:</label>
                        <input type="email" name="email" id="email" required>
                    </div>
                    <div class="form-group">
                        <label for="message">Your message:</label>
                        <textarea name="message" id="message" required></textarea>
                    </div>
                    <button type="submit" class="submit-button">Send</button>
                </form>
            </div>
            
            <a href="../../index.html" class="back-link contact-back-single">← Back to Home</a>
        </div>
    </div>
</body>
</html>
